spring:
  application:
    name: cultivation-help-app
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&preferQueryMode=simple&connectTimeout=30&socketTimeout=120&tcpKeepAlive=true}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.your_project_ref}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    hikari:
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 0
      minimum-idle: 1
      maximum-pool-size: 5
      keepalive-time: 30000

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    connect-retries: ${FLYWAY_CONNECT_RETRIES:10}
    connect-retries-interval: ${FLYWAY_CONNECT_RETRIES_INTERVAL:5s}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.cultivation: DEBUG

app:
  jwt:
    secret: ${APP_JWT_SECRET:change_me_with_a_long_random_secret}
    expiration: 86400000

weather:
  openweather:
    base-url: ${OPENWEATHER_BASE_URL:https://api.openweathermap.org}
    api-key: ${OPENWEATHER_API_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: Cultivation Help App API
    version: 1.0.0
    description: Farm management system with AI integration